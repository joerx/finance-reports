{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "finance-reports-dashboard.fullname" . }}
  labels:
    {{- include "finance-reports-dashboard.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: cluster-issuer
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ include "finance-reports-dashboard.fullname" . }}-tls
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "finance-reports-dashboard.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
