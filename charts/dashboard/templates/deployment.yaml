apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "expense-reports.fullname" . }}
  labels:
    {{- include "expense-reports.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "expense-reports.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "expense-reports.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: dashboard
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8501
          envFrom:
            - secretRef:
                name: {{ .Values.secretName }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
