apiVersion: v1
kind: Service
metadata:
  name: {{ include "expense-reports.fullname" . }}
  labels:
    {{- include "expense-reports.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "expense-reports.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
